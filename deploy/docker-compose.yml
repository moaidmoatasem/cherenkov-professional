version: '3.8'

services:
  # Ollama AI Service
  ollama:
    image: ollama/ollama:latest
    container_name: cherenkov-ollama
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_MAX_LOADED_MODELS=2
      - OLLAMA_NUM_PARALLEL=2
    networks:
      - cherenkov-net
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 6G
        reservations:
          memory: 2G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3

  # cherenkov Scanner Service
  scanner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cherenkov-scanner
    depends_on:
      - ollama
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - CREWAI_TELEMETRY_OPT_OUT=true
    networks:
      - cherenkov-net
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          memory: 512M
    restart: unless-stopped
    command: tail -f /dev/null

  # Web Dashboard — now served by FastAPI (Flask retired)
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cherenkov-dashboard
    depends_on:
      - scanner
      - ollama
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output
    environment:
      - cherenkov_API_HOST=0.0.0.0
      - cherenkov_API_PORT=8000
      - OLLAMA_BASE_URL=http://ollama:11434
    networks:
      - cherenkov-net
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    restart: unless-stopped
    command: uvicorn cherenkov.api.main:app --host 0.0.0.0 --port 8000

  # Redis Cache (for scan results)
  redis:
    image: redis:7-alpine
    container_name: cherenkov-redis
    volumes:
      - redis-data:/data
    networks:
      - cherenkov-net
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: cherenkov-nginx
    depends_on:
      - dashboard
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - cherenkov-net
    restart: unless-stopped

  # Kali TOKAMAK (air-gapped ephemeral PoC container)
  # This service definition is intentionally minimal — containers are launched
  # ephemerally by ScanTOKAMAK / Tokamak.execute(), not kept running.
  tokamak:
    image: kalilinux/kali-rolling
    container_name: cherenkov-tokamak-base
    network_mode: none
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges
    restart: "no"
    # Keep alive only for image caching; do not start automatically
    profiles: ["tools"]

  # LATTICE — Qdrant vector store for adaptive learning / false-positive memory
  qdrant:
    image: qdrant/qdrant:latest
    container_name: cherenkov-qdrant
    ports:
      - "6333:6333"   # REST API (health + collections)
      - "6334:6334"   # gRPC
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=WARN
    networks:
      - cherenkov-net
      - cherenkov-internal
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  cherenkov-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
  # Internal network for TOKAMAK scanner containers — no external egress
  cherenkov-internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.21.0.0/16

volumes:
  ollama-data:
    driver: local
  redis-data:
    driver: local
  qdrant-data:
    driver: local

