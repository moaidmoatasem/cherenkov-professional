name: Stale Issue Management
on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: This issue is stale. Please update or it will be closed in 7 days.
          stale-issue-label: 'status:stale'
          exempt-issue-labels: 'epic,priority:critical,priority:high,status:in-progress,security'
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-pr-message: This PR is stale. Please update or it will be closed in 14 days.
          stale-pr-label: 'status:stale'
          exempt-pr-labels: 'dependencies,security,status:review-needed'
          days-before-pr-stale: 45
          days-before-pr-close: 14
          operations-per-run: 100
          remove-stale-when-updated: true
