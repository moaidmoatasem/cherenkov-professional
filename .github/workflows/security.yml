name: Security Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Run Bandit (security linter)
      id: bandit
      run: |
        pip install "bandit[sarif]"
        TARGETS=""
        if [ -d "src" ]; then TARGETS="$TARGETS src"; fi
        if [ -d "packages" ]; then TARGETS="$TARGETS packages"; fi
        TARGETS="$(echo "$TARGETS" | xargs)"

        if [ -z "$TARGETS" ]; then
          echo "No src/ or packages/ directory found; skipping Bandit."
          exit 0
        fi

        bandit -r $TARGETS -f sarif -o bandit-results.sarif || true

    - name: Upload Bandit to GitHub Security
      if: >
        hashFiles('bandit-results.sarif') != '' &&
        (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: 'bandit-results.sarif'
        category: 'bandit'

  codeql-analysis:
    # NOTE: GitHub's repo-level "default setup" CodeQL and this advanced workflow
    # cannot coexist — the upload step fails with
    # "CodeQL analyses from advanced configurations cannot be processed when
    #  the default setup is enabled."
    # Until default setup is disabled in Settings → Code security → Code scanning,
    # this job runs analysis locally but skips the upload gracefully.
    runs-on: ubuntu-latest
    continue-on-error: true   # pre-existing conflict with default-setup CodeQL
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: 'python'
        build-mode: 'none'

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        # upload:false avoids the "default setup conflict" hard failure;
        # switch back to true after disabling default setup in repo settings.
        upload: false
        category: 'codeql'
