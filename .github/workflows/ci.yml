name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-cov black pylint

    - name: Run Black (code formatting)
      run: |
        black --check src/ scripts/ || echo "Black formatting differences found (non-blocking)"

    - name: Run Pylint
      run: |
        pylint src/cherenkov --fail-under=7.5 || echo "Pylint score below 7.5 (non-blocking)"

    - name: Run unit tests only
      run: |
        pytest tests/unit/
        echo "✅ Code quality checks completed"

    - name: Upload coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
        verbose: true

    - name: Summary
      run: |
        echo "✅ CI checks completed"
        echo "Note: Integration tests require local Ollama/OpenAI setup"

