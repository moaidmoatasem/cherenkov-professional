name: Issue Command Automation
on:
  issue_comment:
    types: [created]

jobs:
  commands:
    if: |
      contains(github.event.comment.body, '/assign') ||
      contains(github.event.comment.body, '/milestone') ||
      contains(github.event.comment.body, '/label') ||
      contains(github.event.comment.body, '/phase') ||
      contains(github.event.comment.body, '/priority') ||
      contains(github.event.comment.body, '/close')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.comment.body;
            const issue = context.payload.issue.number;
            const user = context.payload.comment.user.login;
            const h = {
              owner: context.repo.owner,
              repo: context.repo.repo
            };

            const handlers = {
              '/assign': async () => {
                const m = body.match(/\/assign\s*(@\w+)?/);
                const a = m && m[1] ? m[1].replace('@','') : user;
                await github.rest.issues.addAssignees({...h, issue_number: issue, assignees: [a]});
                return `Assigned @${a}.`;
              },
              '/milestone': async () => {
                const m = body.match(/\/milestone\s+(.+)/);
                if (!m) return 'Usage: /milestone <name>';
                const { data: ms } = await github.rest.issues.listMilestones({...h});
                const found = ms.find(x => x.title.toLowerCase() === m[1].trim().toLowerCase());
                if (!found) return `Milestone "${m[1].trim()}" not found.`;
                await github.rest.issues.update({...h, issue_number: issue, milestone: found.number});
                return `Set milestone to "${found.title}".`;
              },
              '/label': async () => {
                const m = body.match(/\/label\s+([\w:-]+(?:\s*,\s*[\w:-]+)*)/);
                if (!m) return 'Usage: /label <label1, label2>';
                await github.rest.issues.addLabels({...h, issue_number: issue, labels: m[1].split(',').map(l => l.trim())});
                return `Labels added.`;
              },
              '/phase': async () => {
                const m = body.match(/\/phase\s+(.+)/);
                if (!m) return 'Usage: /phase <phase-n>';
                await github.rest.issues.addLabels({...h, issue_number: issue, labels: [m[1].trim()]});
                return `Phase set.`;
              },
              '/priority': async () => {
                const m = body.match(/\/priority\s+(.+)/);
                if (!m) return 'Usage: /priority <level>';
                await github.rest.issues.addLabels({...h, issue_number: issue, labels: [`priority:${m[1].trim()}`]});
                return `Priority set.`;
              },
              '/close': async () => {
                await github.rest.issues.update({...h, issue_number: issue, state: 'closed'});
                return `Closed.`;
              }
            };

            for (const [cmd, fn] of Object.entries(handlers)) {
              if (body.includes(cmd)) {
                const reply = await fn();
                await github.rest.issues.createComment({...h, issue_number: issue, body: reply});
                break;
              }
            }
