name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-cov black pylint

    - name: Run Black (code formatting)
      run: |
        black --check src/ scripts/ || echo "Black formatting differences found (non-blocking)"

    - name: Run Pylint
      run: |
        pylint src/mithaq --fail-under=7.5 || echo "Pylint score below 7.5 (non-blocking)"

    - name: Run unit tests only
      run: |
        pytest tests/unit/
        echo "✅ Code quality checks completed"

    - name: Upload coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
        verbose: true

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        docker build -t mithaq:latest .

    - name: Test Docker image
      run: |
        docker run --rm mithaq:latest python --version

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Run Bandit (security linter)
      run: |
        pip install "bandit[sarif]"
        bandit -r src/mithaq -f sarif -o bandit-results.sarif || true

    - name: Run Safety (dependency check)
      run: |
        pip install safety
        safety check --full-report || true

    - name: Run Trivy security scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Bandit to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'bandit-results.sarif'
        category: 'bandit'
      if: always()

