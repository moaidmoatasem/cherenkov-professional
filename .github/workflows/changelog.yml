name: Generate Changelog

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate CHANGELOG.md
        run: |
          cat > CHANGELOG.md << 'CHANGELOG_EOF'
# Changelog

All notable changes to DAQIQ will be documented in this file.

## [${{ github.event.release.tag_name }}] - $(date +%Y-%m-%d)

### Added
${{ github.event.release.body }}

### Security
- Dependency updates and vulnerability fixes

---

CHANGELOG_EOF
          
          # Append git log if needed
          echo "" >> CHANGELOG.md
          echo "## Previous Releases" >> CHANGELOG.md
          git log --oneline --decorate | head -20 >> CHANGELOG.md
      
      - name: Commit changelog
        uses: EndBug/add-and-commit@v9
        with:
          author_name: DAQIQ Bot
          author_email: bot@daqiq.ai
          message: 'docs: update CHANGELOG for ${{ github.event.release.tag_name }}'
          add: 'CHANGELOG.md'
