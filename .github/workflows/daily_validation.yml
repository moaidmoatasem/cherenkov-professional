name: Nightly Scanner Validation

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Start DVWA
        run: |
          docker run -d \
            --name dvwa \
            -p 8080:80 \
            -e RECAPTCHA_PRIV_KEY="" \
            -e RECAPTCHA_PUB_KEY="" \
            vulnerables/web-dvwa
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/ && break
            sleep 2
          done

      - name: Start WebGoat
        run: |
          docker run -d \
            --name webgoat \
            -p 8090:8080 \
            webgoat/goat-and-wolf
          for i in $(seq 1 30); do
            curl -sf http://localhost:8090/WebGoat/ && break
            sleep 2
          done

      - name: Generate candidates from CVE feed
        run: |
          python src/cherenkov/dev_crew/scanner_generator.py \
            --from-cve-feed \
            --limit 3
        env:
          cherenkov_OLLAMA_URL: ${{ vars.cherenkov_OLLAMA_URL || 'http://localhost:11434' }}
          cherenkov_OLLAMA_MODEL: ${{ vars.cherenkov_OLLAMA_MODEL || 'qwen2.5-coder:7b' }}

      - name: Validate candidates
        id: validate
        shell: bash
        run: |
          passed=0
          failed=0
          passed_files=()

          shopt -s nullglob
          candidates=(candidates/generated_scanners/*.py)

          if [ ${#candidates[@]} -eq 0 ]; then
            echo "No candidates to validate."
            echo "passed=0" >> "$GITHUB_OUTPUT"
            echo "failed=0" >> "$GITHUB_OUTPUT"
            echo "passed_files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          for candidate in "${candidates[@]}"; do
            name=$(basename "$candidate" .py)
            echo "::group::Validating $name"
            fail_reason=""

            # Step 1 & 2: unit tests (positive + negative)
            if ! pytest "tests/unit/scanners/test_${name}.py" -v 2>&1; then
              fail_reason="unit tests (positive/negative)"
            fi

            # Step 3: DVWA integration
            if [ -z "$fail_reason" ]; then
              if ! pytest tests/integration/ -k "$name" -m requires_dvwa -v 2>&1; then
                fail_reason="DVWA integration test"
              fi
            fi

            # Step 4: WebGoat false-positive check
            if [ -z "$fail_reason" ]; then
              if ! pytest tests/integration/ -k "$name" -m webgoat -v 2>&1; then
                fail_reason="WebGoat false-positive test"
              fi
            fi

            # Step 5: bandit static analysis
            if [ -z "$fail_reason" ]; then
              if ! bandit -r "$candidate" -ll 2>&1; then
                fail_reason="bandit static analysis"
              fi
            fi

            if [ -z "$fail_reason" ]; then
              echo "PASS: $name"
              passed=$((passed + 1))
              passed_files+=("$name")
            else
              echo "FAIL: $name — $fail_reason"
              failed=$((failed + 1))
              # Comment on any open issue referencing this scanner
              issue_number=$(gh issue list --state open --search "$name" --json number --jq '.[0].number' 2>/dev/null || true)
              if [ -n "$issue_number" ]; then
                gh issue comment "$issue_number" \
                  --body "Nightly validation failed for \`${name}\` — failed at: **${fail_reason}**. Run \`python tools/session_manager.py show validate_candidate\` for the manual validation steps."
              fi
            fi

            echo "::endgroup::"
          done

          echo "passed=$passed" >> "$GITHUB_OUTPUT"
          echo "failed=$failed" >> "$GITHUB_OUTPUT"
          # Serialize as space-separated list; PR step iterates over it
          echo "passed_files=${passed_files[*]}" >> "$GITHUB_OUTPUT"
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Graduate passing candidates and open PRs
        if: steps.validate.outputs.passed != '0'
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          read -ra passed_files <<< "${{ steps.validate.outputs.passed_files }}"
          prs_opened=0

          for name in "${passed_files[@]}"; do
            src="candidates/generated_scanners/${name}.py"
            dst="src/cherenkov/scanners/${name}.py"

            branch="feat/graduate-${name}-$(date +%Y%m%d)"
            git checkout -b "$branch"

            cp "$src" "$dst"
            git add "$dst"
            git commit -m "feat(scanner): graduate ${name} from candidates

All 5 validation gate steps passed:
- Unit positive + negative
- DVWA integration
- WebGoat false-positive
- bandit static analysis"

            git push origin "$branch"

            gh pr create \
              --title "feat(scanner): graduate ${name}" \
              --body "$(cat <<EOF
## Summary
- Graduated \`${name}\` from \`candidates/generated_scanners/\` to \`src/cherenkov/scanners/\`
- All 5 validation gate steps passed (unit positive, unit negative, DVWA, WebGoat, bandit)
- Generated by nightly validation workflow on $(date -u +%Y-%m-%d)

## Validation checklist
- [x] Unit test: positive case (finds vuln with mocked HTTP)
- [x] Unit test: negative case (no false positive when vuln absent)
- [x] Integration test: fires on DVWA (localhost:8080)
- [x] Does NOT fire on WebGoat safe pages (localhost:8090)
- [x] bandit: no new security issues

🤖 Generated by [nightly-validation](../../actions/workflows/daily_validation.yml)
EOF
)" \
              --base main \
              --head "$branch"

            prs_opened=$((prs_opened + 1))
            git checkout main
          done

          echo "PRs opened: $prs_opened"
            GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report summary
        if: always()
        run: |
          echo "### Nightly Validation Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Result | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Passed | ${{ steps.validate.outputs.passed }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Failed | ${{ steps.validate.outputs.failed }} |" >> "$GITHUB_STEP_SUMMARY"

