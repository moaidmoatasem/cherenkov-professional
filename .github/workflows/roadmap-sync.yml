name: Roadmap Sync
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update ROADMAP_PROGRESS.md from milestones
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { data: ms } = await github.rest.issues.listMilestones({
              owner: context.repo.owner, repo: context.repo.repo, state: 'open', sort: 'due_on'
            });
            let content = '# Roadmap & Progress\n\n';
            content += `_Updated: ${new Date().toISOString().slice(0,10)}_\n\n`;
            content += '```mermaid\ngantt\n    title CHERENKOV Roadmap\n    dateFormat YYYY-MM-DD\n';
            for (const m of ms) {
              const total = m.open_issues + m.closed_issues;
              const status = total > 0 && m.closed_issues === total ? 'done' : 'active';
              content += `    ${m.title} :${status}, ${m.due_on ? m.due_on.slice(0,10) : '2026-12-31'}\n`;
            }
            content += '```\n\n## Status\n\n';
            for (const m of ms) {
              const total = m.open_issues + m.closed_issues;
              const pct = total > 0 ? Math.round((m.closed_issues/total)*100) : 0;
              content += `### ${m.title}\n- **Progress:** ${pct}% (${m.closed_issues}/${total})\n- **Due:** ${m.due_on ? m.due_on.slice(0,10) : 'TBD'}\n\n`;
            }
            fs.writeFileSync('docs/plan/ROADMAP_PROGRESS.md', content);
            console.log('Updated ROADMAP_PROGRESS.md');

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/plan/ROADMAP_PROGRESS.md
          git diff --cached --quiet || git commit -m "docs: auto-sync roadmap from milestones"
          git push
