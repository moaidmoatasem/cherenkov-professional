name: Auto-Update README

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Update version in README
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          echo "Updating to version: $VERSION"
          
          # Update version badge
          sed -i "s|badge/version-[^-]*-|badge/version-${VERSION}-|g" README.md
          
          # Update Docker pull command
          sed -i "s|moaidmoatasem/daqiq:[^[:space:]]*|moaidmoatasem/daqiq:${VERSION}|g" README.md
          
          # Update in Quick Start if present
          sed -i "s|daqiq:latest|daqiq:${VERSION}|g" README.md
      
      - name: Update feature count
        run: |
          FEATURES=$(find daqiq -name "*.py" -type f | grep -v __pycache__ | grep -v __init__ | wc -l)
          sed -i "s|badge/features-[0-9]*-|badge/features-${FEATURES}-|g" README.md
      
      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          author_name: DAQIQ Bot
          author_email: bot@daqiq.ai
          message: 'docs: auto-update README for release ${{ github.event.release.tag_name }}'
          add: 'README.md'
