# Daqiq Security Framework - Continue.dev Configuration
# Local Ollama setup with qwen3.5

name: Daqiq Local Development
version: 1.0.0
schema: v1

# Define models
models:
  # Main chat model - qwen3.5 (downloaded)
  - uses: ollama/qwen3.5
    name: Qwen 3.5 Coding
    
  # Fallback: If you want to try qwen2.5-coder when downloaded
  # - uses: ollama/qwen2.5-coder-7b
  #   name: Qwen 2.5 Coder

# Tab autocomplete (use same model)
tabAutocompleteModel:
  uses: ollama/qwen3.5

# Context/embeddings provider
embeddingsProvider:
  uses: ollama/qwen3.5

# Slash commands
slashCommands:
  - name: edit
    description: Edit selected code
  - name: comment
    description: Write comments for code
  - name: share
    description: Export chat
  - name: cmd
    description: Generate shell command
  - name: test
    description: Generate tests for code

# MCP Servers (optional, can leave empty for now)
mcpServers: []
