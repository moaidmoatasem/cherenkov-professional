<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cherenkov - Sovereign Security Portal</title>
  <link rel="stylesheet" href="stylesheets/tokens.css">
  <link rel="stylesheet" href="stylesheets/main.css">
  <link rel="stylesheet" href="stylesheets/meissner-fx.css">
  <style>
    body {
      margin: 0;
      padding: var(--sp-2xl);
      background: var(--bg-canvas);
      min-height: 100vh;
      font-family: var(--font-sans);
    }
    /* Atomic Overrides */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 3fr 1fr;
      gap: var(--sp-xl);
      max-width: var(--container-max);
      margin: 0 auto;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--sp-2xl);
      padding-bottom: var(--sp-md);
      border-bottom: 1px solid var(--border-hud);
      max-width: var(--container-max);
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body class="cyber-canvas fx-grid">
  <div id="app"></div>
  <script type="module" src="app.js"></script>
</body>
</html>
