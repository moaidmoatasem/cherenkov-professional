version: '3.8'
services:
  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes: [./models:/root/.ollama]
    restart: unless-stopped
  
  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: [./qdrant:/qdrant/storage]
  
  crewai-hub:
    build: .
    ports: ["8000:8000"]
    volumes: [./cherenkov-v2:/app/cherenkov-v2, ./agents:/app/agents]
    working_dir: /app/cherenkov-v2
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - PYTHONPATH=/app/cherenkov-v2
    depends_on: [ollama]

