
<!DOCTYPE html>
<html>
<head>
    <title>cherenkov Security Scanner</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            max-width: 1200px; 
            margin: 50px auto; 
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        h1 { color: #00ff88; }
        .scan-form { 
            background: #2a2a2a; 
            padding: 20px; 
            border-radius: 8px;
            margin-bottom: 30px;
        }
        input[type="text"] { 
            width: 60%; 
            padding: 10px; 
            font-size: 16px;
            background: #3a3a3a;
            border: 1px solid #555;
            color: #fff;
            border-radius: 4px;
        }
        button { 
            padding: 10px 20px; 
            font-size: 16px; 
            background: #00ff88;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            color: #000;
            font-weight: bold;
        }
        button:hover { background: #00cc66; }
        .results { 
            background: #2a2a2a; 
            padding: 20px;
            border-radius: 8px;
        }
        .vuln { 
            background: #3a3a3a; 
            padding: 10px; 
            margin: 10px 0;
            border-left: 4px solid #ff4444;
            border-radius: 4px;
        }
        .vuln.high { border-left-color: #ff4444; }
        .vuln.medium { border-left-color: #ffaa00; }
        .vuln.low { border-left-color: #ffff00; }
        .loading { display: none; color: #00ff88; }
    </style>
</head>
<body>
    <h1>🔍 cherenkov Security Scanner</h1>
    
    <div class="scan-form">
        <h2>Run Scan</h2>
        <input type="text" id="url" placeholder="https://example.com" />
        <button onclick="runScan()">Scan Now</button>
        <p class="loading" id="loading">⏳ Scanning...</p>
    </div>
    
    <div class="results">
        <h2>Results</h2>
        <div id="results">No scans yet. Enter a URL above to start.</div>
    </div>
    
    <script>
        async function runScan() {
            const url = document.getElementById('url').value;
            if (!url) {
                alert('Please enter a URL');
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').innerHTML = '⏳ Scanning...';
            
            try {
                const response = await fetch('/api/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });
                
                const data = await response.json();
                displayResults(data);
            } catch (error) {
                document.getElementById('results').innerHTML = 
                    '<p style="color: #ff4444;">Error: ' + error + '</p>';
            }
            
            document.getElementById('loading').style.display = 'none';
        }
        
        function displayResults(data) {
            let html = '<h3>Scan Results for ' + data.target + '</h3>';
            html += '<p>Vulnerabilities found: ' + data.count + '</p>';
            
            if (data.vulnerabilities.length > 0) {
                data.vulnerabilities.forEach(v => {
                    html += '<div class="vuln ' + v.severity.toLowerCase() + '">';
                    html += '<strong>' + v.type + '</strong> [' + v.severity + ']<br>';
                    html += v.description;
                    html += '</div>';
                });
            } else {
                html += '<p style="color: #00ff88;">✅ No vulnerabilities detected!</p>';
            }
            
            document.getElementById('results').innerHTML = html;
        }
    </script>
</body>
</html>
