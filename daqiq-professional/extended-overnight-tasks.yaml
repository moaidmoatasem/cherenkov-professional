web_security_advanced:
  - name: "NoSQL Injection Scanner"
    type: database_scanner
    description: "MongoDB, CouchDB, Redis injection detection"
    features:
      - MongoDB operator injection ($where, $ne, $gt)
      - CouchDB query injection
      - Redis command injection
      - Cassandra CQL injection
      - Graph database injection (Neo4j, ArangoDB)
    
  - name: "LDAP Injection Scanner"
    type: injection_scanner
    description: "LDAP query injection and bypass detection"
    features:
      - Authentication bypass via LDAP injection
      - Blind LDAP injection
      - Filter injection
      - DN injection
    
  - name: "Template Injection Scanner (SSTI)"
    type: injection_scanner
    description: "Server-Side Template Injection detection"
    features:
      - Jinja2 SSTI (Python/Flask)
      - Twig SSTI (PHP)
      - Freemarker SSTI (Java)
      - Velocity SSTI (Java)
      - ERB SSTI (Ruby)
      - Smarty SSTI (PHP)
    
  - name: "Command Injection Scanner"
    type: injection_scanner
    description: "OS command injection detection"
    features:
      - Direct command injection
      - Blind command injection
      - Time-based detection
      - Out-of-band detection (DNS/HTTP)
      - Multiple OS support (Linux, Windows)
    
  - name: "Path Traversal Advanced Scanner"
    type: file_scanner
    description: "Advanced directory traversal techniques"
    features:
      - Unicode encoding bypass
      - Double URL encoding
      - UNC path injection (Windows)
      - Symlink following
      - Zip slip vulnerability

