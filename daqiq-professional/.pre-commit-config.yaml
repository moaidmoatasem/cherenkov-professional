repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: '1.7.8'
    hooks:
      - id: bandit
        args: ["-ll", "-r", "src/"]

  - repo: local
    hooks:
      - id: pytest-coverage
        name: pytest with coverage
        entry: pytest
        language: system
        pass_filenames: false
        always_run: true
        args: ["--cov=daqiq", "--cov-fail-under=25", "-v"]
        # Note: Coverage requirement matches pyproject.toml
