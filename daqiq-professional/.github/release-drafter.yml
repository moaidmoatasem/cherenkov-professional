name-template: 'v$RESOLVED_VERSION 🚀'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
  - title: '🧰 Maintenance'
    label: 'chore'
  - title: '📚 Documentation'
    label: 'documentation'
  - title: '🔒 Security'
    labels:
      - 'security'
      - 'vulnerability'
  - title: '⬆️ Dependencies'
    labels:
      - 'dependencies'
      - 'python'
    collapse-after: 5

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - 'major'
  minor:
    labels:
      - 'minor'
      - 'feature'
  patch:
    labels:
      - 'patch'
      - 'fix'
      - 'bugfix'
      - 'chore'
  default: patch

exclude-labels:
  - 'skip-changelog'

template: |
  ## 📋 Changes
  
  $CHANGES
  
  ## 👥 Contributors
  
  $CONTRIBUTORS

autolabeler:
  - label: 'documentation'
    files:
      - '*.md'
      - 'docs/**/*'
  - label: 'bug'
    branch:
      - '/fix\/.+/'
    title:
      - '/fix/i'
  - label: 'feature'
    branch:
      - '/feature\/.+/'
  - label: 'chore'
    files:
      - '.github/**/*'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.gitignore'
  - label: 'dependencies'
    files:
      - 'requirements*.txt'
      - 'pyproject.toml'
  - label: 'security'
    title:
      - '/security/i'
      - '/vulnerability/i'
      - '/cve/i'
