services:
  # Web Dashboard
  - type: web
    name: daqiq-dashboard
    env: docker
    dockerfilePath: ./deploy/Dockerfile
    plan: free  # FREE tier
    healthCheckPath: /health
    envVars:
      - key: OLLAMA_HOST
        value: http://ollama:11434
      - key: FLASK_ENV
        value: production
    
  # Background Workers
  - type: worker
    name: daqiq-scanner
    env: docker
    dockerfilePath: ./deploy/Dockerfile
    plan: free
    dockerCommand: python scripts/autonomous_roadmap_executor.py

  # Redis Cache
  - type: redis
    name: daqiq-cache
    plan: free
    maxmemoryPolicy: allkeys-lru
