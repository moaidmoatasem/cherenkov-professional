<svg viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes reactor-pulse {
      0%, 100% { stroke-opacity: 0.6; stroke-width: 6; }
      50% { stroke-opacity: 1; stroke-width: 7.5; }
    }
    @keyframes core-glow {
      0%, 100% { filter: drop-shadow(0 0 4px #00E0FF); opacity: 0.8; transform: scale(1); }
      50% { filter: drop-shadow(0 0 16px #00E0FF); opacity: 1; transform: scale(1.05); }
    }
    @keyframes data-flicker {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    .reactor-shield { animation: reactor-pulse 3s infinite ease-in-out; }
    .core-reveal { animation: core-glow 2s infinite ease-in-out; transform-origin: 55px 50px; }
    .data-point { animation: data-flicker 3s infinite ease-in-out; }
  </style>

  <!-- Animated Symbol -->
  <g transform="translate(10, 10)">
    <!-- Hexagonal Sentinel Shield -->
    <path d="M50 5 L89 27.5 V72.5 L50 95 L11 72.5 V27.5 L50 5Z" stroke="url(#hex-grad)" stroke-width="6" stroke-linejoin="round" class="reactor-shield" />
    
    <!-- The Reveal / Conical Wavefront -->
    <path d="M70 30 A 25 25 0 1 0 70 70" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.9" />
    <path d="M55 50 L88 32 V68 Z" fill="#00E0FF" class="core-reveal" />
    
    <!-- Micro-Validation Points -->
    <circle cx="60" cy="45" r="1.5" fill="white" class="data-point" style="animation-delay: 0.2s;" />
    <circle cx="68" cy="52" r="1.5" fill="white" class="data-point" style="animation-delay: 0.5s;" />
    <circle cx="64" cy="58" r="1.5" fill="white" class="data-point" style="animation-delay: 0.8s;" />
    
    <defs>
      <linearGradient id="hex-grad" x1="11" y1="5" x2="89" y2="95" gradientUnits="userSpaceOnUse">
        <stop stop-color="#00E0FF" />
        <stop offset="1" stop-color="#9D00FF" />
      </linearGradient>
    </defs>
  </g>
  
  <!-- Wordmark -->
  <text x="115" y="60" fill="#F0F1F5" style="font-family: 'Inter', sans-serif; font-weight: 800; font-size: 38px; letter-spacing: -0.02em;">CHERENKOV</text>
  <text x="115" y="85" fill="#F0F1F5" opacity="0.5" style="font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.4em;">THE FORENSIC REVEAL</text>
</svg>
