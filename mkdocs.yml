site_name: CHERENKOV Architecture
site_description: THE FORENSIC REVEAL
theme:
  name: material
  palette:
    scheme: slate
    primary: cyan
    accent: purple
  logo: assets/cherenkov-logo.svg
  favicon: assets/cherenkov-logo.svg
  font:
    text: Inter
    code: IBM Plex Mono
  features:
    - navigation.tabs
    - navigation.top
    - navigation.indexes
extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
nav:
  - Home: index.md
  - Architecture:
    - System Architecture: architecture/SYSTEM_ARCHITECTURE.md
    - High-Level Design (HLD): architecture/HLD_DIAGRAM.md
    - Low-Level Design (LLD): architecture/LLD_DIAGRAM.md
  - Project Plan:
    - Development Plan: plan/development_plan.md
    - Roadmap & Progress: plan/ROADMAP_PROGRESS.md

site_dir: site
