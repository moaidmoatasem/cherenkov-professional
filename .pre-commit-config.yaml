repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-r", "mithaq/"]
        exclude: ^tests/
  
  - repo: local
    hooks:
      - id: pytest-cov
        name: pytest with 80% coverage requirement
        entry: pytest
        language: system
        args: ["--cov=mithaq", "--cov-fail-under=25", "-v", "--tb=short"]
        pass_filenames: false
        always_run: true

