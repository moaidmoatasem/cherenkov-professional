version: '3.8'

services:
  # cherenkov Scanner - Memory Optimized
  cherenkov:
    build:
      context: .
      dockerfile: Dockerfile.optimized
    container_name: cherenkov-scanner
    volumes:
      - ./output:/app/output
      - ./logs:/app/logs
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - CREWAI_TELEMETRY_OPT_OUT=true
      - PYTHONUNBUFFERED=1
    networks:
      - cherenkov-network
    depends_on:
      - ollama
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          memory: 512M
    restart: unless-stopped

  # Ollama Service - Optimized for qwen2.5:3b
  ollama:
    image: ollama/ollama:latest
    container_name: cherenkov-ollama
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_FLASH_ATTENTION=1
    networks:
      - cherenkov-network
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          memory: 2G
    restart: unless-stopped

  # Web Dashboard - Lightweight
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.optimized
    container_name: cherenkov-dashboard
    command: ["cherenkov_web.py"]
    ports:
      - "5000:5000"
    volumes:
      - ./output:/app/output
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    networks:
      - cherenkov-network
    depends_on:
      - cherenkov
      - ollama
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          memory: 256M
    restart: unless-stopped

  # Redis for caching scan results (optional)
  redis:
    image: redis:7-alpine
    container_name: cherenkov-cache
    volumes:
      - redis-data:/data
    networks:
      - cherenkov-network
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

networks:
  cherenkov-network:
    driver: bridge

volumes:
  ollama-data:
    driver: local
  redis-data:
    driver: local

