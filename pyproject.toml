[project]
name = "daqiq"
version = "0.1.0"
description = "Daqiq Security Framework - Precision in Sovereignty"
authors = [
    {name = "Moaid EL-Moatasem Bellah"}
]
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.0",
    "httpx>=0.27.0",
    "python-dotenv>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "pytest-asyncio>=0.23.0",
    "bandit>=1.7.8",
    "ruff>=0.4.0",
    "pre-commit>=3.7.0",
    "aider-chat>=0.50.0",
]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "B", "S"]
ignore = ["E501"]

[tool.bandit]
exclude_dirs = ["tests", "venv", ".venv"]
skips = ["B101"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --cov=daqiq --cov-report=html --cov-report=term --tb=short"

[tool.coverage.run]
source = ["daqiq"]
omit = ["tests/*", "venv/*"]

[tool.coverage.report]
fail_under = 80
precision = 2
show_missing = true
