version: '3.8'
services:
  orchestrator:
    build: ./orchestrator
    container_name: daqiq-orchestrator
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - ZAP_HOST=http://zap:8080
      - REDIS_HOST=redis:6379
    volumes:
      - ./results:/app/results
    depends_on:
      - ollama
      - redis
    networks:
      - daqiq-network
    ports:
      - "8000:8000"
  ollama:
    image: ollama/ollama:latest
    container_name: daqiq-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - daqiq-network
  redis:
    image: redis:7-alpine
    container_name: daqiq-redis
    ports:
      - "6379:6379"
    networks:
      - daqiq-network
volumes:
  ollama-data:
networks:
  daqiq-network:
    driver: bridge
